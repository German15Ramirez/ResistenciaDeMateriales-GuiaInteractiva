<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superposición de Cortante</title>
    
    <script>
    (function() {
        const modoGuardado = localStorage.getItem("modo");
        if (modoGuardado === "oscuro") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
            if (!modoGuardado) {
                localStorage.setItem("modo", "claro");
            }
        }
    })();
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class'
    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-15px);
            }
        }
        
        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        
        .animate-pulse-slow {
            animation: pulse 2s ease-in-out infinite;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        
        .shimmer-text {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6, #1e3a8a);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
        }
        
        .dark .shimmer-text {
            background: linear-gradient(90deg, #60a5fa, #93c5fd, #60a5fa);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
        }
        
        .construction-icon {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
        }
        
        .dark .construction-icon {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
        }
        
        @keyframes border-pulse {
            0%, 100% {
                border-color: rgba(59, 130, 246, 0.3);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2);
            }
            50% {
                border-color: rgba(59, 130, 246, 0.8);
                box-shadow: 0 0 20px 5px rgba(59, 130, 246, 0.4);
            }
        }
        
        .pulse-border {
            animation: border-pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100">

    <header class="bg-blue-900 text-white py-16 shadow-lg dark:bg-blue-800">
        <div class="max-w-5xl mx-auto text-center px-6">
            <div class="flex justify-end mb-4">
            </div>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">
               Superposición de Cortante
            </h1>
            <p class="text-lg md:text-xl text-blue-100 opacity-90">
                Análisis de esfuerzos cortantes combinados
            </p>
            
            <!-- Botón de completado -->
            <div class="mt-6">
                <button 
                    id="btnCompletado"
                    onclick="toggleCompletado('1.3_superposicion_cortante')"
                    class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition flex items-center gap-2 shadow-md mx-auto"
                >
                    📚 Marcar como completado
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-20 min-h-[60vh] flex items-center justify-center">
        
        <div class="text-center">
            <div class="relative inline-block mb-8">
                <div class="absolute inset-0 bg-blue-500 rounded-full blur-xl opacity-30 animate-pulse"></div>
            </div>
            
            <h2 class="text-5xl md:text-7xl font-bold mb-6 shimmer-text">
                Próximamente
            </h2>
            
            <div class="flex justify-center mb-8">
                <div class="w-24 h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent rounded-full animate-pulse"></div>
            </div>
            
            <p class="text-xl text-gray-600 dark:text-gray-400 max-w-2xl mx-auto leading-relaxed">
                Este tema se encuentra en desarrollo. <br>
                Pronto estará disponible.
            </p>
            
            <div class="mt-8 inline-flex items-center gap-2 px-4 py-2 bg-yellow-100 dark:bg-yellow-900/30 rounded-full">
                <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                <span class="text-sm text-yellow-800 dark:text-yellow-400 font-medium">En construcción</span>
            </div>
            
            <div class="max-w-md mx-auto mt-12">
                <div class="relative h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div class="absolute top-0 left-0 h-full w-3/4 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full pulse-border"></div>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Avance: 75%</p>
            </div>
            
        </div>
        
    </main>

    <footer id="info" class="bg-gray-900 text-white py-8 mt-16 relative overflow-hidden dark:bg-gray-950">
        <div class="absolute inset-0 opacity-10">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-500 rounded-full blur-3xl"></div>
        </div>
        
        <div class="max-w-6xl mx-auto px-6 relative z-10">
            <div class="flex flex-col items-center space-y-4">
                <div class="w-32 h-0.5 bg-gradient-to-r from-transparent via-blue-400 to-transparent"></div>
                
                <div class="flex space-x-3 pt-2">
                    <a href="https://www.facebook.com/DivisionIngenieriaCunoc/" target="_blank" class="text-gray-500 hover:text-blue-400 transition-colors duration-300 transform hover:scale-110">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879v-6.99h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.99C18.343 21.128 22 16.991 22 12z"/>
                        </svg>
                    </a>
                    <a href="http://ingenieria.cunoc.usac.edu.gt/" target="_blank" class="text-gray-500 hover:text-blue-400 transition-colors duration-300 transform hover:scale-110">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.93V18c0 .55-.45 1-1 1s-1-.45-1-1v-1.07c-2.83-.48-5-2.94-5-5.93 0-.55.45-1 1-1s1 .45 1 1c0 1.85 1.28 3.42 3 3.87v-3.74c-1.72-.45-3-2.02-3-3.87 0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.85-1.28 3.42-3 3.87v3.74c1.72-.45 3-2.02 3-3.87 0-.55.45-1 1-1s1 .45 1 1c0 2.99-2.17 5.45-5 5.93z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/darkmode.js"></script>
    <script src="../js/progreso.js"></script>
    
    <script>
        // Actualizar botón de completado
        if (typeof actualizarBotonEnPagina === 'function') {
            actualizarBotonEnPagina('1.3_superposicion_cortante');
        }
    </script>
</body>
</html>
