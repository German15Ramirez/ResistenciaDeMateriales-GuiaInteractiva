<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Guía Interactiva - Resistencia de Materiales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Script que evita el flash - se ejecuta INMEDIATAMENTE -->
<script>
(function() {
  const modoGuardado = localStorage.getItem("modo");
  if (modoGuardado === "oscuro") {
    document.documentElement.classList.add("dark");
  } else {
    document.documentElement.classList.remove("dark");
    if (!modoGuardado) {
      localStorage.setItem("modo", "claro");
    }
  }
})();
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<link rel="stylesheet" href="css/progreso.css">

<style>
/* Animaciones y efectos visuales */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

#barraProgreso {
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}
#barraProgreso::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
}
@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}


.tema {
    animation: scaleIn 0.3s ease forwards;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.tema:nth-child(1) { animation-delay: 0.05s; }
.tema:nth-child(2) { animation-delay: 0.1s; }
.tema:nth-child(3) { animation-delay: 0.15s; }
.tema:nth-child(4) { animation-delay: 0.2s; }
.tema:nth-child(5) { animation-delay: 0.25s; }
.tema:nth-child(6) { animation-delay: 0.3s; }

.tema:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.2);
}

#buscador {
    transition: all 0.3s ease;
}
#buscador:focus {
    transform: scale(1.01);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

.acordeon {
    transition: background-color 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.contenido {
    transition: opacity 0.2s ease, transform 0.2s ease;
    opacity: 1;
    transform: translateY(0);
}

.contenido.hidden {
    display: none !important;
    opacity: 0;
    transform: translateY(-10px);
}

@media (max-width: 768px) {
    .acordeon:active {
        transform: scale(0.99);
    }
    
    .contenido {
        will-change: opacity, transform;
    }
    
    .tema, .acordeon, .contenido {
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
    }
}

.hero-gradient {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    position: relative;
    overflow: hidden;
}
.hero-gradient::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    animation: rotate 20s linear infinite;
}
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.completado-badge {
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
}

::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}
.dark ::-webkit-scrollbar-track {
    background: #1f2937;
}
::-webkit-scrollbar-thumb {
    background: #1e3a8a;
    border-radius: 10px;
}
.dark ::-webkit-scrollbar-thumb {
    background: #3b82f6;
}
::-webkit-scrollbar-thumb:hover {
    background: #2563eb;
}
</style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 font-sans dark:text-gray-100">

<div id="navbar"></div>

<div id="hero" class="hero-gradient relative overflow-hidden">
    <div class="max-w-7xl mx-auto px-6 py-16 relative z-10">
        <div class="text-center">
            <div class="inline-block mb-4">
                <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-sm mx-auto">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-white to-blue-400 bg-clip-text text-transparent">
                Resistencia de Materiales
            </h1>
            <p class="text-lg text-blue-200 max-w-2xl mx-auto">
                Domina los conceptos fundamentales del comportamiento estructural con nuestras guías interactivas
            </p>
        </div>
    </div>
    <div class="absolute bottom-0 left-0 right-0">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" class="w-full">
            <path fill="currentColor" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </div>
</div>

<main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold bg-gradient-to-r from-blue-800 to-blue-600 dark:from-blue-400 dark:to-blue-300 bg-clip-text text-transparent">
            Temas de Estudio
        </h2>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Explora y marca tu progreso en cada tema</p>
    </div>
    
    <div id="contenedorBarraProgreso" class="mb-8"></div>
    
    <div class="relative max-w-md mx-auto mb-10">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>
        <input
            id="buscador"
            type="text"
            placeholder="Buscar tema..."
            class="pl-10 pr-4 py-2 rounded-xl w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 shadow-sm"
        />
    </div>
    
    <div id="tarjetas" class="dark:text-white"></div>
    
    <div id="noResultados" class="hidden text-center py-12">
        <svg class="w-20 h-20 mx-auto text-gray-400 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <h3 class="text-xl font-semibold text-gray-600 dark:text-gray-400 mb-2">No se encontraron temas</h3>
        <p class="text-gray-500 dark:text-gray-500">Intenta con otra palabra clave</p>
        <button onclick="limpiarBusqueda()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">
            Limpiar búsqueda
        </button>
    </div>
</main>

<div id="footer"></div>

<script>
function limpiarBusqueda() {
    const buscador = document.getElementById('buscador');
    if (buscador) {
        buscador.value = '';
        buscador.dispatchEvent(new Event('input'));
    }
}

document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('buscador').focus();
    }
});
</script>

<script src="js/darkmode.js"></script>
<script src="js/progreso.js"></script>
<script src="components/barraProgreso.js"></script>
<script src="js/acordeon.js"></script>
<script src="js/buscador.js"></script>
<script src="js/components.js"></script>
<script src="js/animaciones.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof barraProgreso !== 'undefined' && barraProgreso.insertar) {
        barraProgreso.insertar('contenedorBarraProgreso');
    }
    
    setTimeout(() => {
        if (typeof window.initProgreso === 'function') {
            window.initProgreso();
        }
    }, 500);
});

window.addEventListener('load', function() {
    setTimeout(() => {
        if (typeof window.actualizarEstadosTarjetas === 'function') {
            window.actualizarEstadosTarjetas();
        }
        if (typeof window.actualizarBarraProgreso === 'function') {
            window.actualizarBarraProgreso();
        }
    }, 500);
});

window.addEventListener('progresoActualizado', function() {
    setTimeout(() => {
        if (typeof window.actualizarEstadosTarjetas === 'function') {
            window.actualizarEstadosTarjetas();
        }
        if (typeof window.actualizarBarraProgreso === 'function') {
            window.actualizarBarraProgreso();
        }
    }, 100);
});

window.addEventListener('focus', function() {
    setTimeout(() => {
        if (typeof window.actualizarEstadosTarjetas === 'function') {
            window.actualizarEstadosTarjetas();
        }
        if (typeof window.actualizarBarraProgreso === 'function') {
            window.actualizarBarraProgreso();
        }
    }, 200);
});

document.addEventListener('click', function(e) {
    if (e.target.closest('.acordeon')) {
        setTimeout(() => {
            if (typeof window.actualizarEstadosTarjetas === 'function') {
                window.actualizarEstadosTarjetas();
            }
        }, 200);
    }
});
</script>

</body>
