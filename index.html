<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Guía Interactiva - Resistencia de Materiales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
darkMode: 'class'
}
</script>

<script>
if(window.matchMedia("(prefers-color-scheme: dark)").matches){
document.documentElement.classList.add("dark")
}
</script>

</head>

<body class="bg-white text-gray-800 font-sans dark:bg-gray-900 dark:text-white">

<div id="navbar"></div>

<div id="hero"></div>

<main id="temas" class="max-w-7xl mx-auto px-6 py-12">

<h2 class="text-3xl font-bold text-center mb-6">
Temas del Curso
</h2>

<input
id="buscador"
type="text"
placeholder="Buscar tema..."
class="border rounded-lg px-4 py-2 mb-10 w-full max-w-md mx-auto block dark:bg-gray-800"
/>

<div id="tarjetas"></div>

</main>

<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/buscador.js"></script>
<script src="js/animaciones.js"></script>
<script src="js/darkmode.js"></script>

</body>
</html>
