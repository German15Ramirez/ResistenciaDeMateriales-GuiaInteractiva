<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Guía Interactiva - Resistencia de Materiales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
(function() {
  const modoGuardado = localStorage.getItem("modo");
  
  if (modoGuardado === "oscuro") {
    document.documentElement.classList.add("dark");
  } else {
    document.documentElement.classList.remove("dark");
    if (!modoGuardado) {
      localStorage.setItem("modo", "claro");
    }
  }
})();
</script>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

<link rel="stylesheet" href="css/progreso.css">

<style>
#barraProgreso {
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
</style>
</head>

<body class="bg-white text-gray-800 font-sans dark:bg-gray-900 dark:text-white">

<div id="navbar"></div>
<div id="hero"></div>

<main class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold text-center mb-6 dark:text-white">
        Temas
    </h2>
    
    <div id="contenedorBarraProgreso"></div>
    
    <input
        id="buscador"
        type="text"
        placeholder="Buscar tema..."
        class="border rounded-lg px-4 py-2 mb-10 w-full max-w-md mx-auto block
        bg-white text-gray-800 border-gray-300
        dark:bg-gray-800 dark:text-white dark:border-gray-600
        focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400"
    />
    
    <div id="tarjetas" class="dark:text-white"></div>
</main>

<div id="footer"></div>

<script src="js/darkmode.js"></script>
<script src="js/progreso.js"></script>
<script src="components/barraProgreso.js"></script>
<script src="js/acordeon.js"></script>
<script src="js/buscador.js"></script>
<script src="js/components.js"></script>
<script src="js/animaciones.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (typeof barraProgreso !== 'undefined' && barraProgreso.insertar) {
        barraProgreso.insertar('contenedorBarraProgreso');
    }
    
    setTimeout(() => {
        if (typeof window.initProgreso === 'function') {
            window.initProgreso();
        }
    }, 500);
});

window.addEventListener('load', function() {
    setTimeout(() => {
        if (typeof window.actualizarEstadosTarjetas === 'function') {
            window.actualizarEstadosTarjetas();
        }
        if (typeof window.actualizarBarraProgreso === 'function') {
            window.actualizarBarraProgreso();
        }
    }, 500);
});

window.addEventListener('progresoActualizado', function() {
    setTimeout(() => {
        if (typeof window.actualizarEstadosTarjetas === 'function') {
            window.actualizarEstadosTarjetas();
        }
        if (typeof window.actualizarBarraProgreso === 'function') {
            window.actualizarBarraProgreso();
        }
    }, 100);
});

window.addEventListener('focus', function() {
    setTimeout(() => {
        if (typeof window.actualizarEstadosTarjetas === 'function') {
            window.actualizarEstadosTarjetas();
        }
        if (typeof window.actualizarBarraProgreso === 'function') {
            window.actualizarBarraProgreso();
        }
    }, 200);
});

document.addEventListener('click', function(e) {
    if (e.target.closest('.acordeon')) {
        setTimeout(() => {
            if (typeof window.actualizarEstadosTarjetas === 'function') {
                window.actualizarEstadosTarjetas();
            }
        }, 200);
    }
});
</script>

</body>
</html>
