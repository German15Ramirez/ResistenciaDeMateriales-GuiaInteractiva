<div class="mapa-mental-container my-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transition-all duration-300 hover:shadow-lg">
        <div class="bg-blue-900 dark:bg-blue-800 px-4 py-2 flex items-center justify-between">
            <h3 class="text-white font-medium text-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                Mapa Conceptual
            </h3>
        </div>
        
        <div class="p-3">
            <!-- Botón/imagen clickeable -->
            <div onclick="abrirMapaMental()" style="cursor: pointer;">
                <img id="mapaImg" 
                     src="" 
                     alt="Mapa mental del tema" 
                     class="w-full rounded-lg transition-all duration-300 hover:scale-[1.02] hover:shadow-md"
                     loading="lazy"
                     decoding="async">
            </div>
            <p class="text-center text-gray-400 dark:text-gray-500 text-xs mt-2">
                Figura: Organización conceptual del tema
            </p>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="modalMapaMental" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/90" onclick="cerrarMapaMental()">
    <div class="relative max-w-5xl w-full mx-4" onclick="event.stopPropagation()">
        <button onclick="cerrarMapaMental()" class="absolute -top-12 right-0 text-white hover:text-gray-300 text-3xl font-light z-10 bg-black/50 rounded-full w-10 h-10 flex items-center justify-center">
            ✕
        </button>
        <img id="modalMapaImg" src="" alt="Mapa mental ampliado" class="w-full rounded-xl shadow-2xl">
        <div class="flex justify-center gap-6 mt-4 text-white/60 text-sm">
            <span class="flex items-center gap-2">🔍 Click fuera o ESC para cerrar</span>
        </div>
    </div>
</div>

<script>
    function abrirMapaMental() {
        const modal = document.getElementById('modalMapaMental');
        const modalImg = document.getElementById('modalMapaImg');
        const mapaImg = document.getElementById('mapaImg');
        
        console.log('Abriendo modal...');
        console.log('mapaImg.src:', mapaImg ? mapaImg.src : 'no encontrado');
        
        if (modal && modalImg && mapaImg && mapaImg.src) {
            modalImg.src = mapaImg.src;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        } else {
            alert('Error al cargar la imagen ampliada');
        }
    }
    
    function cerrarMapaMental() {
        const modal = document.getElementById('modalMapaMental');
        if (modal) {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }
    }
    
    // Cerrar con ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            cerrarMapaMental();
        }
    });
</script>

<style>
    .dark .mapa-mental-container img {
        background-color: #1f2937;
    }
    
    #modalMapaMental {
        transition: opacity 0.2s ease;
        display: none;
    }
    
    #modalMapaMental.flex {
        display: flex !important;
    }
    
    #modalMapaMental.hidden {
        display: none !important;
    }
</style>
