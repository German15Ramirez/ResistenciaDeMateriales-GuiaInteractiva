<div class="mapa-mental-container my-6">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transition-all duration-300 hover:shadow-lg">
        <div class="bg-blue-900 dark:bg-blue-800 px-4 py-2 flex items-center justify-between">
            <h3 class="text-white font-medium text-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                Mapa Conceptual
            </h3>
            <span class="text-white/60 text-xs flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                Click para ampliar
            </span>
        </div>
        
        <div class="p-3">
            <div class="cursor-zoom-in" onclick="abrirMapaMental(this.querySelector('img').src)">
                <img src="" 
                     alt="Mapa mental del tema" 
                     class="w-full rounded-lg transition-all duration-300 hover:scale-[1.02] hover:shadow-md">
            </div>
            <p class="text-center text-gray-400 dark:text-gray-500 text-xs mt-2">
                Figura: Organización conceptual del tema
            </p>
        </div>
    </div>
</div>

<div id="modalMapaMental" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 transition-all duration-300" onclick="cerrarMapaMental()">
    <div class="relative max-w-5xl w-full mx-4" onclick="event.stopPropagation()">
        <button onclick="cerrarMapaMental()" class="absolute -top-10 right-0 text-white/70 hover:text-white text-3xl font-light transition-all">&times;</button>
        <img id="modalMapaImg" src="" alt="Mapa mental ampliado" class="w-full rounded-xl shadow-2xl">
        <p class="text-center text-white/50 text-xs mt-3">Click fuera o ESC para cerrar</p>
    </div>
</div>

<script>
    function abrirMapaMental(src) {
        const modal = document.getElementById('modalMapaMental');
        const modalImg = document.getElementById('modalMapaImg');
        if (modal && modalImg && src) {
            modalImg.src = src;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }
    }
    
    function cerrarMapaMental() {
        const modal = document.getElementById('modalMapaMental');
        if (modal) {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }
    }
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            cerrarMapaMental();
        }
    });
</script>

<style>
    .dark .mapa-mental-container img {
        background-color: #1f2937;
    }
    
    #modalMapaMental {
        transition: opacity 0.2s ease;
    }
    
    #modalMapaMental.hidden {
        display: none;
    }
    
    #modalMapaMental:not(.hidden) {
        display: flex;
    }
</style>
